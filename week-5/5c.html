<!DOCTYPE html>
<html>
<head>
<title>Amrita Vishwa Vidyapeetham</title>

<style>

body{
margin:0;
font-family:Segoe UI, sans-serif;
background-color:midnightblue;
color:white;
}

header{
text-align:center;
padding:35px 10px 10px 10px;
font-size:44px;
font-weight:bold;
color:gold;
text-shadow:2px 2px 6px black;
}

.subheading{
text-align:center;
font-size:22px;
margin-bottom:30px;
color:whitesmoke;
}

nav{
text-align:center;
margin-bottom:35px;
}

nav a{
text-decoration:none;
color:white;
padding:12px 28px;
margin:8px;
display:inline-block;
border:2px solid gold;
border-radius:30px;
font-weight:bold;
transition:0.3s;
}

nav a:hover{
background:gold;
color:black;
}

.layout{
display:flex;
padding:20px 50px;
gap:50px;
}

.login{
width:28%;
padding:30px;
background-color:slategray;
border-radius:20px;
box-shadow:0px 0px 15px black;
}

.login h2{
text-align:center;
color:gold;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:20px;
border:none;
border-radius:30px;
outline:none;
}

button{
width:100%;
padding:14px;
background:gold;
border:none;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:white;
color:black;
}

.details{
width:72%;
}

iframe{
width:100%;
height:550px;
border:none;
border-radius:20px;
background-color:white;
}

</style>
</head>

<form>

</form>
</div>
