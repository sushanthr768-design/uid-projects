<!DOCTYPE html>
<html>
<head>
<title>Bouncing Ball</title>
<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.ball{
    width:100px;
    height:100px;
    background:rgb(110, 133, 17);
    border-radius:50%;
    animation:bounce 1s infinite alternate;
}

@keyframes bounce{
    from{transform:translateY(0);}
    to{transform:translateY(-200px);}
}
</style>
</head>

<body>
<div class="ball"></div>
</body>
</html>
