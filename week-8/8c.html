<!DOCTYPE html>
<html>
<head>
<title>Moving Circle</title>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    overflow:hidden;
}
.circle{
    width:100px;
    height:100px;
     display:flex;
    align-items:center;
    overflow:hidden;
    background:rgb(186, 139, 67);
    border-radius:50%;
    animation:move 3s linear infinite;
}

@keyframes move{
    from{transform:translateX(0) rotate(0deg);}
    to{transform:translateX(500px) rotate(360deg);}
}
</style>
</head>

<body>
<div class="circle">
    <p>rotate</p>
</div>
</body>
</html>
